name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          direct_prompt: |
            Review the changes in this PR. Focus on:
            - Correctness of the implementation
            - Architectural considerations
            - Issues or bugs
            - Performance

            Be very concise and direct. Sacrifice grammar for concision.

            End with a concise summary listing any uncertainties or unresolved questions (if any).

            When evaluating tests: flag use of mocks where real dependencies could be used instead.
